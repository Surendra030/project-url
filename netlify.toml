[build]
  # Specify the functions directory for your Python functions
  functions = "functions" 
  # Command to install dependencies and prepare the functions
  command = "pip install -r requirements.txt"
  # The publish directory for the static site (ensure this points to the right directory)
  publish = "public"

[functions]
  "*":
    # Use Python runtime
    runtime = "python3.8"

[[plugins]]
  package = "@netlify/plugin-python"  # Ensure this plugin is being used for Python
