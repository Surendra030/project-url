[build]
  functions = "functions"  # Specify the functions directory for your Python functions
  command = "pip install -r requirements.txt && netlify-lambda build functions"
  publish = "public"

[functions]
  '*':
    runtime = "python3.8"  # or the version you want to use for your functions

[[plugins]]
  package = "@netlify/plugin-python"  # Ensure the plugin is listed here
